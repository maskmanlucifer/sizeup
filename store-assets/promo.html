<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @font-face {
    font-family: 'Plus Jakarta Sans';
    font-weight: 400 800;
    src: url('../popup/fonts/plus-jakarta-sans-latin.woff2') format('woff2');
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1280px; height: 800px; }
  body {
    font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
    color: #1C1E26;
    background:
      radial-gradient(1100px 700px at 78% -8%, #EFEBFF 0%, rgba(239,235,255,0) 60%),
      radial-gradient(900px 600px at 10% 110%, #EAF0FF 0%, rgba(234,240,255,0) 55%),
      #FBFAFF;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    -webkit-font-smoothing: antialiased;
    padding: 0 110px;
  }

  /* logo lockup */
  .logo { display: flex; align-items: center; gap: 16px; margin-bottom: 40px; }
  .mark {
    width: 64px; height: 64px; border-radius: 18px; background: #6C4DF6;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 12px 28px -6px rgba(108,77,246,.5);
  }
  .word { font-size: 42px; font-weight: 800; letter-spacing: -.02em; line-height: 1; position: relative; top: 2px; }
  .word span { color: #6C4DF6; }

  .eyebrow {
    font-size: 16px; font-weight: 700; letter-spacing: .14em;
    text-transform: uppercase; color: #6C4DF6; margin-bottom: 20px;
  }
  h1 {
    font-size: 62px; line-height: 1.06; font-weight: 800;
    letter-spacing: -.03em; max-width: 1000px;
  }
  h1 .accent { color: #6C4DF6; }
  p.sub {
    font-size: 23px; line-height: 1.5; font-weight: 500; color: #5B6170;
    max-width: 760px; margin-top: 26px;
  }

  /* supported platforms */
  .works { margin-top: 52px; display: flex; align-items: center; gap: 16px; }
  .works-label {
    font-size: 15px; font-weight: 700; letter-spacing: .1em;
    text-transform: uppercase; color: #9AA0AD;
  }
  .pills { display: flex; gap: 12px; }
  .pill {
    display: flex; align-items: center; gap: 9px;
    background: #fff; border: 1px solid #E7E9EF; border-radius: 999px;
    padding: 11px 20px; font-size: 18px; font-weight: 700; color: #1C1E26;
    box-shadow: 0 6px 18px -8px rgba(28,28,55,.18);
  }
  .dot { width: 11px; height: 11px; border-radius: 999px; }
</style>
</head>
<body>
  <div class="logo">
    <div class="mark">
      <svg width="36" height="36" viewBox="0 0 16 16"><g fill="#fff"><rect x="3" y="9" width="2.4" height="4" rx="1.2"/><rect x="6.8" y="6" width="2.4" height="7" rx="1.2"/><rect x="10.6" y="3.5" width="2.4" height="9.5" rx="1.2"/></g></svg>
    </div>
    <div class="word">Size<span>Up</span></div>
  </div>

  <div class="eyebrow">Chrome extension</div>
  <h1>Find your fit,<br>for the <span class="accent">whole family</span>.</h1>
  <p class="sub">Save everyone's measurements once. SizeUp shows which sizes actually fit — right on the product page — and filters listings to your size.</p>

  <div class="works">
    <span class="works-label">Works on</span>
    <div class="pills">
      <div class="pill"><span class="dot" style="background:#FF3F6C"></span>Myntra</div>
      <div class="pill"><span class="dot" style="background:#FF9900"></span>Amazon India</div>
      <div class="pill"><span class="dot" style="background:#2874F0"></span>Flipkart</div>
    </div>
  </div>
</body>
</html>
