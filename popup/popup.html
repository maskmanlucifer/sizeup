<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SizeUp</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- ── Home view ─────────────────────────────────────────────────────── -->
  <div id="view-home" class="view">

    <header class="header">
      <div class="logo">
        <img src="../icons/icon48.png" class="logo-img" alt="SizeUp" />
        <span class="logo-text">SizeUp</span>
      </div>
    </header>

    <div class="filter-bar">
      <span class="filter-label">Shopping for</span>
      <select id="profile-select" class="profile-select">
        <option value="">None</option>
      </select>
    </div>

    <div class="section">
      <div class="section-label">Family members</div>
      <div id="members-list" class="members-list"></div>
      <div id="empty-state" class="empty-state" hidden>
        <div class="empty-icon">👕</div>
        <p>No members yet</p>
        <p class="muted">Add someone to start filtering by their size.</p>
      </div>
    </div>

    <div class="footer">
      <button id="btn-add" class="btn btn-primary btn-full">+ Add family member</button>
    </div>
  </div>

  <!-- ── Add / Edit view ───────────────────────────────────────────────── -->
  <div id="view-form" class="view" hidden>

    <header class="header header-form">
      <button id="btn-back" class="btn-back">← Back</button>
      <span id="form-title" class="form-header-title">Add member</span>
    </header>

    <div class="form-body">
      <input type="hidden" id="field-id" />

      <!-- Name -->
      <div class="field">
        <label class="label" for="field-name">Name</label>
        <input id="field-name" class="input" type="text" placeholder="e.g. Dad, Priya, Aryan…" autocomplete="off" />
      </div>

      <!-- Avatar -->
      <div class="field">
        <label class="label">Avatar</label>
        <div class="emoji-picker" id="emoji-picker">
          <button class="emoji-btn active" data-emoji="🌸" type="button">🌸</button>
          <button class="emoji-btn" data-emoji="🦋" type="button">🦋</button>
          <button class="emoji-btn" data-emoji="⭐" type="button">⭐</button>
          <button class="emoji-btn" data-emoji="🌵" type="button">🌵</button>
          <button class="emoji-btn" data-emoji="🦊" type="button">🦊</button>
          <button class="emoji-btn" data-emoji="🍀" type="button">🍀</button>
        </div>
      </div>

      <!-- Measurements -->
      <div class="field">
        <label class="label">
          Measurements
          <span class="info-icon" tabindex="0">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
            <span class="info-tooltip">Body measurements, not clothing label sizes</span>
          </span>
        </label>
        <div class="mrows" id="mrows">
          <div class="mrow">
            <span class="mrow-label">Height</span>
            <input id="field-height" class="mrow-input" type="number" placeholder="175" min="50" max="250" />
            <span class="mrow-unit">cm</span>
          </div>
          <div class="mrow">
            <span class="mrow-label">Chest</span>
            <input id="field-chest" class="mrow-input" type="number" placeholder="96" min="50" max="160" />
            <span class="mrow-unit">cm</span>
          </div>
          <div class="mrow">
            <span class="mrow-label">Waist</span>
            <input id="field-waist" class="mrow-input" type="number" placeholder="80" min="40" max="160" />
            <span class="mrow-unit">cm</span>
          </div>
          <div class="mrow">
            <span class="mrow-label">Hip</span>
            <input id="field-hip" class="mrow-input" type="number" placeholder="96" min="50" max="170" />
            <span class="mrow-unit">cm</span>
          </div>
          <div class="mrow">
            <span class="mrow-label">Shoulder</span>
            <input id="field-shoulder" class="mrow-input" type="number" placeholder="44" min="20" max="80" />
            <span class="mrow-unit">cm</span>
          </div>
          <div class="mrow" style="border-bottom:none">
            <span class="mrow-label">Inseam</span>
            <input id="field-inseam" class="mrow-input" type="number" placeholder="78" min="30" max="110" />
            <span class="mrow-unit">cm</span>
          </div>
        </div>
      </div>

      <!-- Derived sizes preview -->
      <div id="derived-box" class="derived-box" hidden>
        <div class="derived-preview">
          <span id="preview-emoji" class="preview-emoji">🌸</span>
          <div class="derived-info">
            <div id="derived-sizes-text" class="derived-main"></div>
            <div class="derived-hint">L = international &nbsp;·&nbsp; 42 = Indian numeric</div>
          </div>
        </div>
      </div>

      <!-- Warn box -->
      <div id="measure-warn" class="warn-box" hidden></div>

      <div class="form-actions">
        <button id="btn-cancel" class="btn btn-secondary" type="button">Cancel</button>
        <button id="btn-save" class="btn btn-primary" type="button">Save</button>
      </div>
    </div>

  </div>

  <script src="../utils/size-charts.js"></script>
  <script src="../utils/storage.js"></script>
  <script src="popup.js"></script>
</body>
</html>
